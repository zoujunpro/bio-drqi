server:
  port: ${SERVER_PORT:18095}
spring:
  application:
    name: bio-ai-service
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:${SPIRNG_PROFILES_ACTIVE:dev}}
  cloud:
    nacos:
      config:
        bootstrap: true
        server-addr: ${NACOS_HOST:${NACOS-HOST:172.16.14.2}}:${NACOS_PORT:${NACOS-PORT:8848}}
        group: DEFAULT_GROUP
        namespace: ${NACOS_NAMESPACE:${NACOS-NAMESPACE:bio-${spring.profiles.active}}}
        file-extension: yml
        username: nacos
        password: nacos
      discovery:
        group: DEFAULT_GROUP
        namespace: ${NACOS_NAMESPACE:${NACOS-NAMESPACE:bio-${spring.profiles.active}}}
        server-addr: ${NACOS_HOST:${NACOS-HOST:172.16.14.2}}:${NACOS_PORT:${NACOS-PORT:8848}}
        username: nacos
        password: nacos
        ip: ${DISCOVERY_HOST:${DISCOVERY-HOST:localhost}}

bio:
  ai:
    llm:
      base-url: ${AI_LLM_BASE_URL:http://172.16.14.9:11434/v1}
      model: ${AI_LLM_MODEL:qwen3:8b}
      temperature: ${AI_LLM_TEMPERATURE:0.1}
      timeout: ${AI_LLM_TIMEOUT:600000}

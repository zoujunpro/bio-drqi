server:
  port: ${SERVER_PORT:8094}
spring:
  application:
    name: bio-ai-service
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${AI_DB_URL:jdbc:mysql://127.0.0.1:3306/bio_cer_local?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${AI_DB_USERNAME:root}
    password: ${AI_DB_PASSWORD:mysql2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:3000}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:${SPIRNG_PROFILES_ACTIVE:dev}}
  cloud:
    nacos:
      config:
        bootstrap: true
        server-addr: ${NACOS_HOST:${NACOS-HOST:172.16.14.2}}:${NACOS_PORT:${NACOS-PORT:8848}}
        group: DEFAULT_GROUP
        namespace: ${NACOS_NAMESPACE:${NACOS-NAMESPACE:bio-${spring.profiles.active}}}
        file-extension: yml
        username: nacos
        password: nacos
      discovery:
        group: DEFAULT_GROUP
        namespace: ${NACOS_NAMESPACE:${NACOS-NAMESPACE:bio-${spring.profiles.active}}}
        server-addr: ${NACOS_HOST:${NACOS-HOST:172.16.14.2}}:${NACOS_PORT:${NACOS-PORT:8848}}
        username: nacos
        password: nacos
        register-enabled: ${NACOS_REGISTER_ENABLED:false}
        ip: ${DISCOVERY_HOST:${DISCOVERY-HOST:localhost}}

bio:
  ai:
    llm:
      base-url: ${AI_LLM_BASE_URL:https://ws-g96i4edvjqyqgx4m.cn-beijing.maas.aliyuncs.com/compatible-mode/v1}
      api-key: ${AI_LLM_API_KEY:sk-ws-H.RXMDEEM.iA35.MEQCIDoPibPuYup-36mQO8Qnl2VlznXaejIMCSCtIxZ9mrAEAiAXd_Irm94f6keTBirUc41m6aix2zQYRou0qXfrxiBVOQ}
      model: ${AI_LLM_MODEL:qwen-plus}
      temperature: ${AI_LLM_TEMPERATURE:0.1}
      router-temperature: ${AI_ROUTER_TEMPERATURE:0.0}
      query-temperature: ${AI_QUERY_TEMPERATURE:0.1}
      report-temperature: ${AI_REPORT_TEMPERATURE:0.1}
      command-temperature: ${AI_COMMAND_TEMPERATURE:0.1}
      chat-temperature: ${AI_CHAT_TEMPERATURE:0.7}
      timeout: ${AI_LLM_TIMEOUT:180000}
    commands: []
    max-domain-prompt-size: ${AI_MAX_DOMAIN_PROMPT_SIZE:80}
    risk:
      detail-max-limit: ${AI_DETAIL_MAX_LIMIT:200}
      aggregate-max-limit: ${AI_AGGREGATE_MAX_LIMIT:500}
      no-filter-detail-max-limit: ${AI_NO_FILTER_DETAIL_MAX_LIMIT:50}
      reject-no-filter-detail: ${AI_REJECT_NO_FILTER_DETAIL:false}
      query-timeout-seconds: ${AI_QUERY_TIMEOUT_SECONDS:30}
    memory:
      retention-hours: ${AI_MEMORY_RETENTION_HOURS:24}
      cleanup-enabled: ${AI_MEMORY_CLEANUP_ENABLED:true}
    cache:
      enabled: ${AI_CACHE_ENABLED:true}
      domain-select-ttl-seconds: ${AI_DOMAIN_SELECT_CACHE_TTL_SECONDS:1800}
      query-plan-ttl-seconds: ${AI_QUERY_PLAN_CACHE_TTL_SECONDS:1800}
    intent:
      confidence-threshold: ${AI_INTENT_CONFIDENCE_THRESHOLD:0.6}
      report-export-keywords:
        - 导出
        - Excel
        - excel
        - 报表
        - 下载
      workflow-keywords:
        - 审批
        - 工单
        - 待办
        - 已办
        - 我发起
        - 流程
      business-query-keywords:
        - 统计
        - 查询
        - 查看
        - 明细
        - 表格
        - 数量
        - 多少
        - 趋势
        - 占比
        - 列表
      chat-keywords:
        - 你好
        - 你是谁
        - 怎么用
        - 解释一下
    terms:
      - phrase: 取样数量
        domain: sample
        meaning: 统计取样编号数量
        metric: sampleCodeCount
        field: sampleCode
      - phrase: 样品数量
        domain: sample
        meaning: 统计样品编号数量
        metric: sampleCodeCount
        field: sampleCode
      - phrase: 项目数量
        domain: project
        meaning: 统计项目编号数量
        metric: projectCodeCount
        field: projectCode
      - phrase: 实施方案数量
        domain: vector_task
        meaning: 统计实施方案编号数量
        metric: vectorTaskCodeCount
        field: vectorTaskCode
    include-tables:
      - cer_*
      - tc_*
      - seed_*
      - plant_*
      - bio_sample*
      - bio_task*
      - bms_product*
      - bms_order*
      - bms_move*
      - bms_return*
      - bms_supplier*
      - bms_brand*
      - bms_stock*
    exclude-tables:
      - system_*
      - "*_log"
      - "*_ref"
      - "*_dict"
      - "*_conf"
      - "*_config"
      - "*_file*"
      - bio_request_log
      - bio_notice_log
      - bio_applet_login_tb
      - bio_print*
      - cer_flow_step_conf
      - cer_project_task_approve_tb
    exclude-fields:
      - password
      - passwd
      - token
      - access_token
      - refresh_token
      - "*secret*"
      - "*key*"
      - phone
      - mobile
      - tel
      - id_card
      - identity_card
      - open_id
      - union_id
      - session_key
      - salt
      - avatar
      - address
      - contact
      - remark
      - remarks
    dict-fields: []

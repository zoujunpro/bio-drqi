<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 智能查询</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --surface: #ffffff;
      --text: #1f2328;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #10a37f;
      --primary-dark: #0d8f70;
      --danger: #b42318;
      --soft: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .brand {
      font-size: 16px;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .select,
    .input {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 9px;
      outline: none;
    }

    .input {
      width: 230px;
    }

    .chat {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 24px 16px 150px;
    }

    .welcome {
      min-height: calc(100vh - 230px);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 18px;
      text-align: center;
    }

    .welcome h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .suggestions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: min(680px, 100%);
    }

    .suggestion {
      min-height: 54px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      text-align: left;
      cursor: pointer;
      color: #374151;
    }

    .suggestion:hover {
      border-color: #c7ccd5;
      background: #fbfbfc;
    }

    .message {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 14px;
      padding: 20px 0;
      border-bottom: 1px solid var(--line);
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #fff;
      background: #64748b;
      flex: none;
    }

    .message.assistant .avatar {
      background: var(--primary);
    }

    .bubble {
      min-width: 0;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .btn {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn:hover {
      background: var(--soft);
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--primary-dark);
    }

    .btn.icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      padding: 0;
      font-size: 18px;
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .result-card {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfbfc;
      color: #374151;
      font-weight: 700;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      height: 28px;
      padding: 0 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      color: #374151;
    }

    .tab.active {
      border-color: var(--primary);
      color: var(--primary);
      background: #ecfdf5;
    }

    .result-body {
      padding: 12px;
    }

    .chart-box {
      height: 360px;
      background: #fff;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    table {
      width: 100%;
      min-width: 660px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      font-weight: 700;
      position: sticky;
      top: 0;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    details {
      margin-top: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 600;
    }

    pre {
      margin: 10px 0 0;
      padding: 12px;
      max-height: 280px;
      overflow: auto;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      line-height: 1.55;
      white-space: pre;
    }

    .composer-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 18px 16px 20px;
      background: linear-gradient(180deg, rgba(247, 247, 248, 0), var(--bg) 28%);
      z-index: 20;
    }

    .composer {
      width: min(900px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
    }

    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 160px;
      border: 0;
      outline: none;
      resize: none;
      padding: 10px 8px;
      font: inherit;
      line-height: 1.55;
    }

    .hint {
      width: min(900px, 100%);
      margin: 8px auto 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .status {
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 720px) {
      .topbar {
        height: auto;
        align-items: flex-start;
        flex-direction: column;
        padding: 12px;
      }

      .top-actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .input {
        width: 100%;
        grid-column: 1 / -1;
      }

      .suggestions {
        grid-template-columns: 1fr;
      }

      .message {
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">AI 智能查询</div>
    <div class="top-actions">
      <input id="apiBase" class="input" placeholder="接口地址，如 http://localhost:8093/cer">
      <select id="chartType" class="select" title="图表类型">
        <option value="auto">auto</option>
        <option value="table">table</option>
        <option value="bar">bar</option>
        <option value="line">line</option>
        <option value="pie">pie</option>
      </select>
      <input id="fileName" class="input" placeholder="导出文件名，可不填">
    </div>
  </header>

  <main id="chat" class="chat">
    <section id="welcome" class="welcome">
      <h1>需要查询什么数据？</h1>
      <div class="suggestions">
        <button class="suggestion">统计最近一年每个月质粒质检数量，并用柱状图展示</button>
        <button class="suggestion">查询最近 20 条种子入库记录，返回表格</button>
        <button class="suggestion">统计不同状态的项目数量，用饼图展示</button>
        <button class="suggestion">导出最近一个月质粒质检汇总和明细 Excel</button>
      </div>
    </section>
  </main>

  <div class="composer-wrap">
    <div class="composer">
      <textarea id="question" placeholder="输入问题，回车发送，Shift+回车换行"></textarea>
      <button id="sendBtn" class="btn icon primary" title="发送">↑</button>
    </div>
    <div id="status" class="hint">支持图表渲染、表格展示、CSV/JSON 下载和 Excel 导出</div>
  </div>
</div>

<script>
  const state = {
    messages: [],
    lastResult: null,
    activeTable: 0,
    activeChart: 0,
    loading: false,
    loadingStartedAt: 0,
    loadingTimer: null,
    loadingText: ''
  };

  const els = {
    chat: document.getElementById('chat'),
    welcome: document.getElementById('welcome'),
    question: document.getElementById('question'),
    sendBtn: document.getElementById('sendBtn'),
    apiBase: document.getElementById('apiBase'),
    chartType: document.getElementById('chartType'),
    fileName: document.getElementById('fileName'),
    status: document.getElementById('status')
  };

  function setStatus(message, error) {
    els.status.textContent = message || '';
    els.status.className = 'hint' + (error ? ' status error' : '');
  }

  function startRequestWatch(message) {
    stopRequestWatch();
    state.loadingStartedAt = Date.now();
    state.loadingText = message || '正在处理请求';
    setStatus(state.loadingText + '，请不要刷新或关闭页面');
    state.loadingTimer = window.setInterval(() => {
      const seconds = Math.max(1, Math.floor((Date.now() - state.loadingStartedAt) / 1000));
      setStatus(state.loadingText + '，已等待 ' + seconds + ' 秒，请不要刷新或关闭页面');
    }, 1000);
  }

  function stopRequestWatch() {
    if (state.loadingTimer) {
      window.clearInterval(state.loadingTimer);
      state.loadingTimer = null;
    }
  }

  function unwrapResponse(json) {
    if (!json || typeof json !== 'object') return json;
    if (json.data !== undefined) return json.data;
    if (json.result !== undefined) return json.result;
    if (json.obj !== undefined) return json.obj;
    return json;
  }

  function appBase() {
    if (window.location.protocol === 'file:') {
      return '';
    }
    const parts = window.location.pathname.split('/').filter(Boolean);
    if (!parts.length) return '';
    const last = parts[parts.length - 1];
    if (last.indexOf('.') > -1) {
      parts.pop();
    }
    return parts.length ? '/' + parts[0] : '';
  }

  function apiPath(path) {
    const configuredBase = (els.apiBase.value || '').trim().replace(/\/$/, '');
    if (configuredBase) {
      localStorage.setItem('aiQueryApiBase', configuredBase);
      return configuredBase + path;
    }
    return appBase() + path;
  }

  function requestHeaders() {
    return {
      'Content-Type': 'application/json',
      'userId': '68',
      'username': 'zoujun',
      'nickname': 'zoujun',
      'jobNum': '1-023'
    };
  }

  function fetchOptions(path, body) {
    const url = apiPath(path);
    return {
      url: url,
      options: {
        method: 'POST',
        headers: requestHeaders(),
        credentials: 'include',
        cache: 'no-store',
        mode: url.indexOf('http') === 0 ? 'cors' : 'same-origin',
        body: JSON.stringify(body)
      }
    };
  }

  async function postJson(path, body) {
    const request = fetchOptions(path, body);
    const response = await fetch(request.url, request.options);
    const text = await response.text();
    let json = null;
    try {
      json = text ? JSON.parse(text) : null;
    } catch (e) {
      json = null;
    }
    if (!response.ok) {
      throw new Error((json && (json.message || json.msg)) || text || ('HTTP ' + response.status));
    }
    if (json && (json.success === false || json.code === 500 || json.code === '500')) {
      throw new Error(json.message || json.msg || '请求失败');
    }
    return unwrapResponse(json);
  }

  async function sendQuestion(questionText) {
    const question = (questionText || els.question.value).trim();
    if (!question || state.loading) return;

    state.loading = true;
    els.sendBtn.disabled = true;
    els.sendBtn.textContent = '...';
    els.question.value = '';
    autoResize();
    hideWelcome();
    addMessage('user', question);
    const loadingId = addMessage('assistant', '正在分析数据...', true);
    startRequestWatch('正在生成查询计划并执行查询');

    try {
      const result = await postJson('/ai/analysis', {
        question: question,
        chartType: els.chartType.value
      });
      state.lastResult = result || {};
      state.activeTable = 0;
      state.activeChart = 0;
      replaceAssistantMessage(loadingId, state.lastResult);
      setStatus('查询完成');
    } catch (error) {
      const message = friendlyError(error);
      replaceAssistantMessage(loadingId, {answer: message});
      setStatus(message, true);
    } finally {
      stopRequestWatch();
      state.loading = false;
      els.sendBtn.disabled = false;
      els.sendBtn.textContent = '↑';
      els.question.focus();
    }
  }

  function hideWelcome() {
    if (els.welcome) {
      els.welcome.classList.add('hidden');
    }
  }

  function addMessage(role, content, loading) {
    const id = 'msg-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    const message = document.createElement('article');
    message.className = 'message ' + role;
    message.dataset.id = id;
    message.innerHTML = '<div class="avatar">' + (role === 'user' ? '我' : 'AI') + '</div><div class="bubble"></div>';
    const bubble = message.querySelector('.bubble');
    bubble.textContent = content || '';
    if (loading) {
      bubble.classList.add('status');
    }
    els.chat.appendChild(message);
    scrollBottom();
    return id;
  }

  function replaceAssistantMessage(id, result) {
    const message = els.chat.querySelector('[data-id="' + id + '"]');
    if (!message) return;
    const bubble = message.querySelector('.bubble');
    bubble.className = 'bubble';
    bubble.innerHTML = '';
    renderAssistantResult(bubble, result || {});
    scrollBottom();
  }

  function renderAssistantResult(container, result) {
    const answer = document.createElement('div');
    answer.textContent = friendlyAnswer(result);
    container.appendChild(answer);

    const actions = document.createElement('div');
    actions.className = 'result-actions';
    if ((result.tables || []).length) {
      actions.appendChild(actionButton('下载 Excel', () => exportReport()));
      actions.appendChild(actionButton('下载 CSV', () => downloadCurrentCsv(result)));
    }
    if (actions.children.length) {
      container.appendChild(actions);
    }

    if ((result.charts || []).length) {
      container.appendChild(renderChartCard(result));
    }
    if ((result.tables || []).length) {
      container.appendChild(renderTableCard(result));
    }
    if (result.queryPlan && localStorage.getItem('aiQueryDebug') === 'true') {
      container.appendChild(renderPlan(result.queryPlan));
    }
  }

  function actionButton(text, onClick) {
    const button = document.createElement('button');
    button.className = 'btn';
    button.textContent = text;
    button.onclick = onClick;
    return button;
  }

  function renderChartCard(result) {
    const card = document.createElement('section');
    card.className = 'result-card';
    const head = document.createElement('div');
    head.className = 'result-head';
    head.innerHTML = '<span>图表</span>';
    const tabs = document.createElement('div');
    tabs.className = 'tabs';
    result.charts.forEach((chart, index) => {
      const tab = document.createElement('button');
      tab.className = 'tab' + (index === state.activeChart ? ' active' : '');
      tab.textContent = chart.title || chart.type || ('图表 ' + (index + 1));
      tab.onclick = () => {
        state.activeChart = index;
        redrawResult(result);
      };
      tabs.appendChild(tab);
    });
    head.appendChild(tabs);
    card.appendChild(head);

    const body = document.createElement('div');
    body.className = 'result-body';
    const box = document.createElement('div');
    box.className = 'chart-box';
    const canvas = document.createElement('canvas');
    box.appendChild(canvas);
    body.appendChild(box);
    card.appendChild(body);

    requestAnimationFrame(() => drawChart(canvas, result.charts[state.activeChart] || result.charts[0]));
    return card;
  }

  function renderTableCard(result) {
    const card = document.createElement('section');
    card.className = 'result-card';
    const head = document.createElement('div');
    head.className = 'result-head';
    head.innerHTML = '<span>表格</span>';
    const tabs = document.createElement('div');
    tabs.className = 'tabs';
    result.tables.forEach((table, index) => {
      const tab = document.createElement('button');
      tab.className = 'tab' + (index === state.activeTable ? ' active' : '');
      tab.textContent = table.title || ('表格 ' + (index + 1));
      tab.onclick = () => {
        state.activeTable = index;
        redrawResult(result);
      };
      tabs.appendChild(tab);
    });
    head.appendChild(tabs);
    card.appendChild(head);

    const body = document.createElement('div');
    body.className = 'result-body';
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    wrap.appendChild(buildTable(result.tables[state.activeTable] || result.tables[0]));
    body.appendChild(wrap);
    card.appendChild(body);
    return card;
  }

  function renderPlan(plan) {
    const details = document.createElement('details');
    const summary = document.createElement('summary');
    summary.textContent = '技术信息';
    const pre = document.createElement('pre');
    pre.textContent = JSON.stringify(plan || {}, null, 2);
    details.appendChild(summary);
    details.appendChild(pre);
    return details;
  }

  function redrawResult(result) {
    const messages = els.chat.querySelectorAll('.message.assistant');
    const last = messages[messages.length - 1];
    if (!last) return;
    const bubble = last.querySelector('.bubble');
    bubble.innerHTML = '';
    renderAssistantResult(bubble, result);
  }

  function buildTable(tableData) {
    const table = document.createElement('table');
    const columns = normalizeColumns(tableData);
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    columns.forEach(column => {
      const th = document.createElement('th');
      th.textContent = column.label || column.field;
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const rows = tableData.data || [];
    if (!rows.length) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = Math.max(columns.length, 1);
      td.textContent = '暂无数据';
      tr.appendChild(td);
      tbody.appendChild(tr);
    }
    rows.forEach(row => {
      const tr = document.createElement('tr');
      columns.forEach(column => {
        const td = document.createElement('td');
        td.textContent = formatCell(row[column.field]);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return table;
  }

  function normalizeColumns(tableData) {
    if (tableData.columns && tableData.columns.length) {
      return tableData.columns.map(column => ({
        field: column.field || column.prop || column.key || column.dataIndex,
        label: column.label || column.title || column.field || column.prop || column.key || column.dataIndex
      })).filter(column => column.field);
    }
    const first = (tableData.data || [])[0] || {};
    return Object.keys(first).map(key => ({field: key, label: key}));
  }

  function formatCell(value) {
    if (value === null || value === undefined) return '';
    if (typeof value === 'object') return JSON.stringify(value);
    return String(value);
  }

  function friendlyAnswer(result) {
    if (!result) return '没有拿到查询结果，请稍后再试。';
    if (result.answer) return result.answer;
    if ((result.tables || []).length) {
      if (result.tables.length > 1) {
        return '已查询完成，结果分为 ' + result.tables.length + ' 张表展示。';
      }
      const table = result.tables[0] || {};
      const count = (table.data || []).length;
      return count ? ('查到 ' + count + ' 条记录，已按表格展示。') : '没有查到符合条件的数据。';
    }
    if ((result.charts || []).length) {
      return '统计完成，已生成图表。';
    }
    return '这个问题需要再明确一下展示方式，可以告诉我想看明细、统计数量、趋势图还是导出 Excel。';
  }

  function friendlyError(error) {
    const message = (error && error.message) ? error.message : '查询失败';
    if (message.indexOf('Failed to fetch') >= 0) {
      return '连接接口失败，请确认服务已启动，或者顶部接口地址是否正确。';
    }
    if (message.indexOf('AI模型调用失败') >= 0 || message.indexOf('timeout') >= 0 || message.indexOf('超时') >= 0) {
      return '模型响应时间较长，本次没有成功返回。可以稍后重试，或把问题范围缩小一些。';
    }
    if (message.indexOf('AI未能识别') >= 0 || message.indexOf('查询计划') >= 0) {
      return '这个问题我还没理解清楚，可以换一种说法，或者说明要查询的业务和时间范围。';
    }
    if (message.indexOf('系统忙不过来') >= 0) {
      return '系统当前处理较慢，请稍后再试。';
    }
    return message;
  }

  function drawChart(canvas, chart) {
    const box = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const width = Math.max(320, box.clientWidth);
    const height = Math.max(280, box.clientHeight);
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, width, height);

    const option = chart.option || {};
    const type = (chart.type || getSeriesType(option) || 'bar').toLowerCase();
    const data = extractChartData(option);
    drawTitle(ctx, chart.title || (option.title && option.title.text) || '图表结果', width);
    if (!data.labels.length || !data.values.length) {
      drawEmpty(ctx, width, height);
      return;
    }
    if (type === 'pie') drawPie(ctx, data, width, height);
    else if (type === 'line') drawLine(ctx, data, width, height);
    else drawBar(ctx, data, width, height);
  }

  function getSeriesType(option) {
    const series = Array.isArray(option.series) ? option.series[0] : option.series;
    return series && series.type;
  }

  function extractChartData(option) {
    const series = Array.isArray(option.series) ? option.series[0] : option.series || {};
    const raw = series.data || [];
    if (raw.length && typeof raw[0] === 'object' && !Array.isArray(raw[0])) {
      return {
        labels: raw.map(item => String(item.name || item.label || '')),
        values: raw.map(item => Number(item.value || 0))
      };
    }
    const xAxis = Array.isArray(option.xAxis) ? option.xAxis[0] : option.xAxis || {};
    return {
      labels: (xAxis.data || raw.map((_, index) => String(index + 1))).map(String),
      values: raw.map(value => Number(Array.isArray(value) ? value[1] : value || 0))
    };
  }

  function drawTitle(ctx, title, width) {
    ctx.fillStyle = '#111827';
    ctx.font = '600 15px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(title, width / 2, 24);
  }

  function drawEmpty(ctx, width, height) {
    ctx.fillStyle = '#6b7280';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('图表数据为空', width / 2, height / 2);
  }

  function drawAxes(ctx, left, top, right, bottom) {
    ctx.strokeStyle = '#d1d5db';
    ctx.beginPath();
    ctx.moveTo(left, top);
    ctx.lineTo(left, bottom);
    ctx.lineTo(right, bottom);
    ctx.stroke();
  }

  function drawBar(ctx, data, width, height) {
    const left = 52, right = width - 22, top = 48, bottom = height - 50;
    const max = Math.max(...data.values, 1);
    const slot = (right - left) / data.values.length;
    const barWidth = Math.max(10, Math.min(42, slot - 10));
    drawAxes(ctx, left, top, right, bottom);
    ctx.fillStyle = '#10a37f';
    data.values.forEach((value, index) => {
      const h = (bottom - top) * value / max;
      const x = left + index * slot + (slot - barWidth) / 2;
      ctx.fillRect(x, bottom - h, barWidth, h);
    });
    drawAxisText(ctx, data.labels, data.values, max, left, right, top, bottom);
  }

  function drawLine(ctx, data, width, height) {
    const left = 52, right = width - 22, top = 48, bottom = height - 50;
    const max = Math.max(...data.values, 1);
    const step = data.values.length > 1 ? (right - left) / (data.values.length - 1) : 0;
    drawAxes(ctx, left, top, right, bottom);
    ctx.strokeStyle = '#10a37f';
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.values.forEach((value, index) => {
      const x = left + index * step;
      const y = bottom - (bottom - top) * value / max;
      index ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    });
    ctx.stroke();
    ctx.fillStyle = '#10a37f';
    data.values.forEach((value, index) => {
      const x = left + index * step;
      const y = bottom - (bottom - top) * value / max;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
    });
    drawAxisText(ctx, data.labels, data.values, max, left, right, top, bottom);
  }

  function drawPie(ctx, data, width, height) {
    const total = data.values.reduce((sum, value) => sum + value, 0) || 1;
    const cx = width * .38, cy = height * .56, radius = Math.min(width, height) * .27;
    const colors = ['#10a37f', '#2563eb', '#f59e0b', '#dc2626', '#7c3aed', '#0891b2'];
    let start = -Math.PI / 2;
    data.values.forEach((value, index) => {
      const end = start + Math.PI * 2 * value / total;
      ctx.fillStyle = colors[index % colors.length];
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, start, end);
      ctx.closePath();
      ctx.fill();
      start = end;
    });
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'left';
    data.labels.forEach((label, index) => {
      const y = height * .28 + index * 22;
      ctx.fillStyle = colors[index % colors.length];
      ctx.fillRect(width * .68, y - 10, 10, 10);
      ctx.fillStyle = '#374151';
      ctx.fillText(shortText(label, 16) + '：' + data.values[index], width * .68 + 16, y);
    });
  }

  function drawAxisText(ctx, labels, values, max, left, right, top, bottom) {
    const maxLabels = Math.min(labels.length, 10);
    const skip = Math.max(1, Math.ceil(labels.length / maxLabels));
    const slot = labels.length > 1 ? (right - left) / (labels.length - 1) : 0;
    ctx.fillStyle = '#6b7280';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    labels.forEach((label, index) => {
      if (index % skip === 0) {
        const x = labels.length > 1 ? left + index * slot : (left + right) / 2;
        ctx.fillText(shortText(label, 9), x, bottom + 22);
      }
    });
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
      const value = max * i / 4;
      const y = bottom - (bottom - top) * i / 4;
      ctx.fillText(Number.isInteger(value) ? value : value.toFixed(1), left - 8, y + 4);
    }
  }

  function shortText(text, max) {
    text = String(text || '');
    return text.length > max ? text.slice(0, max - 1) + '...' : text;
  }

  async function exportReport() {
    const question = findLastUserQuestion();
    if (!question || state.loading) return;
    state.loading = true;
    startRequestWatch('正在生成 Excel');
    try {
      const request = fetchOptions('/ai/report/export', {question: question, fileName: els.fileName.value.trim()});
      const response = await fetch(request.url, request.options);
      if (!response.ok) throw new Error(await response.text() || '导出失败');
      const blob = await response.blob();
      downloadBlob(blob, getFileName(response.headers.get('Content-Disposition')) || els.fileName.value.trim() || 'AI查询结果.xlsx');
      setStatus('Excel 已生成');
    } catch (error) {
      setStatus(friendlyError(error), true);
    } finally {
      stopRequestWatch();
      state.loading = false;
    }
  }

  function findLastUserQuestion() {
    const users = els.chat.querySelectorAll('.message.user .bubble');
    return users.length ? users[users.length - 1].textContent.trim() : '';
  }

  function getFileName(contentDisposition) {
    if (!contentDisposition) return '';
    const utf8 = contentDisposition.match(/filename\*=UTF-8''([^;]+)/i);
    if (utf8) return decodeURIComponent(utf8[1]);
    const plain = contentDisposition.match(/filename="?([^"]+)"?/i);
    return plain ? decodeURIComponent(plain[1]) : '';
  }

  function downloadCurrentCsv(result) {
    const table = (result.tables || [])[state.activeTable];
    if (!table) return;
    const columns = normalizeColumns(table);
    const lines = [columns.map(column => csvEscape(column.label || column.field)).join(',')];
    (table.data || []).forEach(row => {
      lines.push(columns.map(column => csvEscape(formatCell(row[column.field]))).join(','));
    });
    downloadBlob(new Blob(['\ufeff' + lines.join('\n')], {type: 'text/csv;charset=utf-8'}), (table.title || 'AI查询结果') + '.csv');
  }

  function csvEscape(value) {
    const text = String(value || '');
    return /[",\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
  }

  function downloadBlob(blob, fileName) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function autoResize() {
    els.question.style.height = '44px';
    els.question.style.height = Math.min(160, els.question.scrollHeight) + 'px';
  }

  function scrollBottom() {
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
  }

  els.sendBtn.onclick = () => sendQuestion();
  els.question.addEventListener('input', autoResize);
  els.question.addEventListener('keydown', event => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendQuestion();
    }
  });
  document.querySelectorAll('.suggestion').forEach(button => {
    button.onclick = () => sendQuestion(button.textContent);
  });
  if (window.location.protocol === 'file:') {
    els.apiBase.value = localStorage.getItem('aiQueryApiBase') || 'http://localhost:8093/cer';
    setStatus('当前是本地文件打开，请确认顶部接口地址正确');
  } else {
    els.apiBase.value = localStorage.getItem('aiQueryApiBase') || '';
  }
  window.addEventListener('resize', () => {
    if (state.lastResult) {
      redrawResult(state.lastResult);
    }
  });
  window.addEventListener('beforeunload', event => {
    if (!state.loading) return;
    event.preventDefault();
    event.returnValue = 'AI 查询还在执行，离开会中断页面等待结果。';
    return event.returnValue;
  });
</script>
</body>

server:
  port: ${SERVER_PORT:8093}
  servlet:
    context-path: /es
spring:
  application:
    name: bio-es-service
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:${SPIRNG_PROFILES_ACTIVE:dev}}
  cloud:
    nacos:
      config:
        bootstrap: true
        server-addr: ${NACOS_HOST:${NACOS-HOST:172.16.14.2}}:${NACOS_PORT:${NACOS-PORT:8848}}
        group: DEFAULT_GROUP
        namespace: ${NACOS_NAMESPACE:${NACOS-NAMESPACE:bio-${spring.profiles.active}}}
        file-extension: yml
        username: nacos
        password: nacos
      discovery:
        group: DEFAULT_GROUP
        namespace: ${NACOS_NAMESPACE:${NACOS-NAMESPACE:bio-${spring.profiles.active}}}
        server-addr: ${NACOS_HOST:${NACOS-HOST:172.16.14.2}}:${NACOS_PORT:${NACOS-PORT:8848}}
        username: nacos
        password: nacos
        ip: ${DISCOVERY_HOST:${DISCOVERY-HOST:localhost}}

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全局搜索</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #dde2ea;
      --text: #1f2933;
      --muted: #657282;
      --soft: #eef2f7;
      --blue: #246bfe;
      --green: #16805b;
      --red: #c24135;
      --amber: #a56714;
      --shadow: 0 10px 24px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(36, 107, 254, 0.08), transparent 34%),
        linear-gradient(45deg, rgba(22, 128, 91, 0.07), transparent 36%),
        var(--bg);
    }

    body.search-open {
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      white-space: nowrap;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: #1f2933;
      color: #fff;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .icon-button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--text);
    }

    .search-band {
      padding: 22px 24px 14px;
    }

    .search-shell {
      max-width: 1180px;
      margin: 0 auto;
    }

    body.search-open .search-band {
      position: fixed;
      z-index: 50;
      left: 50%;
      top: 24px;
      width: min(1180px, calc(100vw - 48px));
      padding: 0;
      transform: translateX(-50%);
    }

    body.search-open .search-shell {
      max-width: none;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: transparent;
      box-shadow: none;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .search-box {
      height: 48px;
      display: grid;
      grid-template-columns: 46px 1fr auto;
      align-items: center;
      border: 1px solid #cfd7e3;
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .search-box svg {
      margin-left: 16px;
      color: var(--muted);
    }

    .search-input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      font-size: 16px;
      color: var(--text);
    }

    .clear-button {
      width: 36px;
      height: 36px;
      margin-right: 6px;
      border: 0;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
    }

    .primary-button {
      height: 48px;
      min-width: 92px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--blue);
      font-weight: 650;
    }

    .select {
      height: 48px;
      min-width: 138px;
      border: 1px solid #cfd7e3;
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding-top: 14px;
      overflow-x: auto;
    }

    .tabs.is-hidden,
    .main.is-hidden {
      display: none;
    }

    .tab {
      height: 34px;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      white-space: nowrap;
    }

    .tab.active {
      border-color: #b9c8df;
      background: #fff;
      color: var(--blue);
      font-weight: 650;
    }

    .main {
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 32px;
      display: grid;
      grid-template-columns: 244px minmax(0, 1fr) 292px;
      gap: 16px;
    }

    .scrim {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(4px);
    }

    body.search-open .scrim {
      display: block;
    }

    body.search-open .main {
      position: fixed;
      z-index: 50;
      left: 50%;
      top: 142px;
      width: min(1180px, calc(100vw - 48px));
      height: calc(100vh - 166px);
      margin: 0;
      padding: 0;
      transform: translateX(-50%);
      overflow: hidden;
    }

    body.search-open .filters,
    body.search-open .preview,
    body.search-open .result-card,
    body.search-open .empty {
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
    }

    .filters,
    .preview {
      align-self: start;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 14px rgba(31, 41, 51, 0.04);
    }

    .filter-section,
    .preview-section {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .filter-section:last-child,
    .preview-section:last-child {
      border-bottom: 0;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .check-row {
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .check-row input {
      width: 16px;
      height: 16px;
    }

    .result-panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .meta-line {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }

    .result-list {
      display: grid;
      gap: 10px;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
      overscroll-behavior: contain;
    }

    body.search-open .result-list {
      flex: 1 1 auto;
    }

    .pager {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .load-more {
      height: 34px;
      min-width: 112px;
      border: 1px solid #cfd7e3;
      border-radius: 7px;
      background: #fff;
      color: var(--text);
    }

    .load-more:disabled {
      cursor: not-allowed;
      color: var(--muted);
      background: #f4f6f8;
    }

    .result-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      box-shadow: 0 4px 14px rgba(31, 41, 51, 0.04);
    }

    .result-card:hover,
    .result-card.active {
      border-color: #9bb8f2;
      box-shadow: 0 8px 24px rgba(36, 107, 254, 0.12);
    }

    .result-main {
      min-width: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      margin-bottom: 7px;
    }

    .badge {
      height: 22px;
      padding: 0 7px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 650;
      background: var(--soft);
      color: var(--muted);
    }

    .badge.task {
      color: #184b88;
      background: #e9f1ff;
    }

    .badge.biotest {
      color: #1f6b50;
      background: #e8f6ef;
    }

    .badge.project {
      color: #7b4b11;
      background: #fff2df;
    }

    .badge.plant {
      color: #2e6a2f;
      background: #eef8e9;
    }

    .badge.seed {
      color: #7b3f28;
      background: #fff0e8;
    }

    .result-title {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    mark {
      color: #0f3f9a;
      background: #dce9ff;
      border-radius: 3px;
      padding: 0 2px;
    }

    .fields {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .field {
      height: 26px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 8px;
      border-radius: 6px;
      background: #f5f7fa;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      color: var(--green);
      font-weight: 650;
    }

    .status.pending {
      color: var(--amber);
    }

    .status.error {
      color: var(--red);
    }

    .result-action {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .preview-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .preview-title {
      margin: 0 0 6px;
      font-size: 16px;
      word-break: break-word;
    }

    .preview-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .kv {
      display: grid;
      gap: 10px;
      font-size: 13px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 10px;
    }

    .kv-key {
      color: var(--muted);
    }

    .kv-value {
      min-width: 0;
      word-break: break-word;
    }

    .empty {
      min-height: 240px;
      border: 1px dashed #bcc7d5;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      max-width: min(360px, calc(100vw - 40px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow);
      display: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 980px) {
      .main {
        grid-template-columns: 220px minmax(0, 1fr);
      }

      .preview {
        display: none;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        padding: 0 14px;
      }

      .top-actions span {
        display: none;
      }

      .search-band {
        padding: 16px 14px 10px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      body.search-open .search-band {
        top: 12px;
        width: calc(100vw - 28px);
      }

      body.search-open .main {
        top: 150px;
        width: calc(100vw - 28px);
        height: calc(100vh - 164px);
      }

      .select,
      .primary-button {
        width: 100%;
      }

      .main {
        grid-template-columns: 1fr;
        padding: 0 14px 24px;
      }

      .filters {
        order: 2;
      }

      .result-panel {
        order: 1;
      }

      .result-card {
        grid-template-columns: 1fr;
      }

      .result-action {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">S</div>
        <span>全局搜索</span>
      </div>
      <div class="top-actions">
        <span>接口数据</span>
        <button class="icon-button" id="refreshBtn" title="刷新">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <path d="M21 3v7h-7"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="search-band">
      <div class="search-shell">
        <div class="search-row">
          <div class="search-box">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </svg>
            <input id="keywordInput" class="search-input" placeholder="输入工单号、样本号、项目编号、物种、申请人" value="T0005647">
            <button class="clear-button" id="clearBtn" title="清空">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
            </button>
          </div>
          <button id="searchBtn" class="primary-button">搜索</button>
        </div>
        <div id="tabs" class="tabs is-hidden"></div>
      </div>
    </section>

    <main id="mainPanel" class="main is-hidden">
      <aside class="filters">
        <section class="filter-section">
          <h2 class="section-title">业务</h2>
          <div id="businessFilters"></div>
        </section>
        <section class="filter-section">
          <h2 class="section-title">时间</h2>
          <select id="dateFilter" class="select" style="width:100%; min-width:0;">
            <option value="all">全部时间</option>
            <option value="today">今天</option>
            <option value="week">近 7 天</option>
            <option value="month">近 30 天</option>
          </select>
        </section>
      </aside>

      <section class="result-panel">
        <div class="meta-line">
          <span id="resultCount">0 条结果</span>
          <span id="queryCost">0 ms</span>
        </div>
        <div id="resultList" class="result-list"></div>
        <div id="pager" class="pager"></div>
      </section>

      <aside id="preview" class="preview"></aside>
    </main>
  </div>

  <div id="scrim" class="scrim"></div>
  <div id="toast" class="toast"></div>

  <script>
    var businessMap = {
      all: "全部",
      task: "任务",
      biotest: "检测",
      project: "项目",
      plant: "植物",
      seed: "种子"
    };

    var state = {
      activeBusiness: "all",
      results: [],
      total: 0,
      nextSearchAfter: null,
      hasNext: false,
      loadingMore: false,
      selectedIndex: 0,
      lastCost: 0,
      searched: false
    };

    var keywordInput = document.getElementById("keywordInput");
    var resultList = document.getElementById("resultList");
    var pager = document.getElementById("pager");
    var resultCount = document.getElementById("resultCount");
    var queryCost = document.getElementById("queryCost");
    var tabs = document.getElementById("tabs");
    var mainPanel = document.getElementById("mainPanel");
    var businessFilters = document.getElementById("businessFilters");
    var preview = document.getElementById("preview");
    var scrim = document.getElementById("scrim");
    var toast = document.getElementById("toast");

    function selectedBusinessCodes() {
      return Array.prototype.slice.call(document.querySelectorAll("#businessFilters input[type=checkbox]:checked"))
        .map(function (input) { return input.value; })
        .filter(Boolean);
    }

    function normalizeApiHits(payload) {
      var data = payload && payload.data ? payload.data : payload;
      var records = data && data.records ? data.records : data;
      if (!Array.isArray(records)) {
        return [];
      }
      return records.map(function (item) {
        return item.source || item;
      });
    }

    function search(showOverlay) {
      if (showOverlay !== false) {
        openSearchOverlay();
      }
      var started = Date.now();
      var keyword = keywordInput.value.trim();
      if (!keyword) {
        state.results = [];
        state.total = 0;
        state.nextSearchAfter = null;
        state.hasNext = false;
        state.loadingMore = false;
        state.lastCost = 0;
        state.selectedIndex = 0;
        state.searched = false;
        render();
        return;
      }
      state.searched = true;
      showSearchPanel();
      resultList.innerHTML = '<div class="empty">正在查询...</div>';
      pager.innerHTML = "";
      preview.innerHTML = "";
      requestSearch(false, started);
    }

    function loadMore() {
      if (!state.hasNext || state.loadingMore) {
        return;
      }
      state.loadingMore = true;
      renderPager();
      requestSearch(true, Date.now());
    }

    function requestSearch(append, started) {
      var keyword = keywordInput.value.trim();
      var body = {
        systemCode: "drqi",
        keyword: keyword,
        businessCodes: selectedBusinessCodes(),
        pageSize: 20
      };
      if (append && state.nextSearchAfter) {
        body.searchAfter = state.nextSearchAfter;
      }
      fetch("http://localhost:8093/es/search/listPage", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "userId": "1",
          "username": "zoujun",
          "nickname": "zoujun",
          "jobNum": "1"
        },
        body: JSON.stringify(body)
      }).then(function (res) {
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        return res.json();
      }).then(function (payload) {
        var data = payload && payload.data ? payload.data : payload;
        var records = normalizeApiHits(payload);
        state.results = append ? state.results.concat(records) : records;
        state.total = data && typeof data.total === "number" ? data.total : state.results.length;
        state.nextSearchAfter = data && data.nextSearchAfter ? data.nextSearchAfter : null;
        state.hasNext = !!(data && data.hasNext);
        state.loadingMore = false;
        state.lastCost = Date.now() - started;
        if (!append) {
          state.activeBusiness = "all";
          state.selectedIndex = 0;
        }
        render();
      }).catch(function (err) {
        if (!append) {
          state.results = [];
          state.total = 0;
          state.nextSearchAfter = null;
          state.hasNext = false;
        }
        state.loadingMore = false;
        state.lastCost = Date.now() - started;
        renderError("接口请求失败：" + err.message);
      });
    }

    function renderTabs() {
      var codes = ["all"].concat(availableBusinessCodes());
      tabs.innerHTML = codes.map(function (code) {
        return '<button class="tab ' + (state.activeBusiness === code ? "active" : "") + '" data-business="' + code + '">' + businessMap[code] + '</button>';
      }).join("");
      tabs.classList.toggle("is-hidden", !state.searched || codes.length <= 1);
    }

    function renderBusinessFilters() {
      var codes = availableBusinessCodes();
      var selected = selectedBusinessCodes();
      var selectedMap = {};
      selected.forEach(function (code) {
        selectedMap[code] = true;
      });
      var hasSelected = selected.length > 0;
      businessFilters.innerHTML = codes.map(function (code) {
        var checked = !hasSelected || selectedMap[code] ? " checked" : "";
        return '<label class="check-row"><input type="checkbox" value="' + escapeHtml(code) + '"' + checked + '>' + escapeHtml(businessMap[code]) + '</label>';
      }).join("");
    }

    function availableBusinessCodes() {
      var seen = {};
      state.results.forEach(function (row) {
        var code = row.business_code || "";
        if (code) {
          seen[code] = true;
          if (!businessMap[code]) {
            businessMap[code] = code;
          }
        }
      });
      return Object.keys(seen);
    }

    function render() {
      renderTabs();
      renderBusinessFilters();
      mainPanel.classList.toggle("is-hidden", !state.searched);
      if (state.activeBusiness !== "all" && availableBusinessCodes().indexOf(state.activeBusiness) < 0) {
        state.activeBusiness = "all";
        renderTabs();
      }
      var rows = state.results;
      if (state.activeBusiness !== "all") {
        rows = state.results.filter(function (row) {
          return row.business_code === state.activeBusiness;
        });
      }
      resultCount.textContent = state.total + " 条结果";
      queryCost.textContent = state.lastCost + " ms";
      if (!rows.length) {
        resultList.innerHTML = '<div class="empty">未找到匹配数据</div>';
        pager.innerHTML = "";
        preview.innerHTML = "";
        return;
      }
      if (state.selectedIndex >= rows.length) {
        state.selectedIndex = 0;
      }
      resultList.innerHTML = rows.map(function (row, index) {
        return renderResultCard(row, index);
      }).join("");
      renderPager();
      renderPreview(rows[state.selectedIndex]);
    }

    function renderError(message) {
      renderTabs();
      renderBusinessFilters();
      showSearchPanel();
      resultCount.textContent = "0 条结果";
      queryCost.textContent = state.lastCost + " ms";
      resultList.innerHTML = '<div class="empty">' + escapeHtml(message) + '</div>';
      pager.innerHTML = "";
      preview.innerHTML = "";
      showToast(message);
    }

    function renderPager() {
      if (!state.hasNext) {
        pager.innerHTML = "";
        return;
      }
      pager.innerHTML = '<button id="loadMoreBtn" class="load-more"' + (state.loadingMore ? " disabled" : "") + '>' + (state.loadingMore ? "加载中..." : "加载更多") + '</button>';
    }

    function renderResultCard(row, index) {
      var business = row.business_code || "project";
      var display = row.display || {};
      var fields = '<span class="field">ID：' + escapeHtml(row.biz_id || "") + '</span>' +
        '<span class="field">表：' + escapeHtml(row.table_name || "") + '</span>' +
        Object.keys(display).slice(0, 3).map(function (key) {
        return '<span class="field">' + escapeHtml(key) + '：' + escapeHtml(display[key]) + '</span>';
      }).join("");
      return '' +
        '<article class="result-card ' + (index === state.selectedIndex ? "active" : "") + '" data-index="' + index + '">' +
        '  <div class="result-main">' +
        '    <div class="title-row">' +
        '      <span class="badge ' + escapeHtml(business) + '">' + escapeHtml(businessMap[business] || business) + '</span>' +
        '      <h3 class="result-title">' + highlight(row.title || row.biz_id || "") + '</h3>' +
        '    </div>' +
        '    <p class="summary">' + highlight(row.summary || "") + '</p>' +
        '    <div class="fields">' + fields + '</div>' +
        '  </div>' +
        '  <button class="result-action" title="打开">' +
        '    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
        '      <path d="M7 17 17 7"></path><path d="M8 7h9v9"></path>' +
        '    </svg>' +
        '  </button>' +
        '</article>';
    }

    function renderPreview(row) {
      var display = row.display || {};
      var kv = Object.keys(display).map(function (key) {
        var value = display[key];
        var cls = isStatusKey(key) ? "kv-value status " + statusClass(value) : "kv-value";
        return '<div class="kv-row"><div class="kv-key">' + escapeHtml(key) + '</div><div class="' + cls + '">' + escapeHtml(value) + '</div></div>';
      }).join("");
      preview.innerHTML = '' +
        '<div class="preview-head">' +
        '  <h2 class="preview-title">' + escapeHtml(row.title || "") + '</h2>' +
        '  <p class="preview-subtitle">' + escapeHtml(businessMap[row.business_code] || row.business_code || "") + ' / ' + escapeHtml(row.table_name || "") + '</p>' +
        '</div>' +
        '<section class="preview-section">' +
        '  <h3 class="section-title">字段</h3>' +
        '  <div class="kv">' + kv + '</div>' +
        '</section>' +
        '<section class="preview-section">' +
        '  <h3 class="section-title">定位</h3>' +
        '  <div class="kv">' +
        '    <div class="kv-row"><div class="kv-key">业务 ID</div><div class="kv-value">' + escapeHtml(row.biz_id || "") + '</div></div>' +
        '    <div class="kv-row"><div class="kv-key">路由</div><div class="kv-value">' + escapeHtml(row.route || "") + '</div></div>' +
        '    <div class="kv-row"><div class="kv-key">时间</div><div class="kv-value">' + escapeHtml(row.create_time || "") + '</div></div>' +
        '  </div>' +
        '</section>';
    }

    function highlight(text) {
      var keyword = keywordInput.value.trim();
      var safe = escapeHtml(String(text || ""));
      if (!keyword) {
        return safe;
      }
      var escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(escapedKeyword, "gi"), function (match) {
        return "<mark>" + match + "</mark>";
      });
    }

    function statusClass(value) {
      if (value === "未同步") {
        return "error";
      }
      if (value === "审批中" || value === "待检测") {
        return "pending";
      }
      return "";
    }

    function isStatusKey(key) {
      return key === "状态" || key === "结果" || /状态$/.test(key) || /结果$/.test(key);
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(function () {
        toast.classList.remove("show");
      }, 3200);
    }

    function openSearchOverlay() {
      document.body.classList.add("search-open");
    }

    function showSearchPanel() {
      mainPanel.classList.remove("is-hidden");
    }

    function closeSearchOverlay() {
      document.body.classList.remove("search-open");
      state.results = [];
      state.total = 0;
      state.nextSearchAfter = null;
      state.hasNext = false;
      state.loadingMore = false;
      state.selectedIndex = 0;
      state.searched = false;
      render();
    }

    document.getElementById("searchBtn").addEventListener("click", search);
    document.getElementById("refreshBtn").addEventListener("click", search);
    document.getElementById("clearBtn").addEventListener("click", function () {
      keywordInput.value = "";
      search();
    });
    keywordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        search();
      }
    });
    keywordInput.addEventListener("focus", function () {
      openSearchOverlay();
    });
    keywordInput.addEventListener("click", function () {
      openSearchOverlay();
    });
    scrim.addEventListener("click", closeSearchOverlay);
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeSearchOverlay();
      }
    });
    tabs.addEventListener("click", function (event) {
      var button = event.target.closest(".tab");
      if (!button) {
        return;
      }
      state.activeBusiness = button.getAttribute("data-business");
      state.selectedIndex = 0;
      render();
    });
    resultList.addEventListener("click", function (event) {
      var card = event.target.closest(".result-card");
      if (!card) {
        return;
      }
      state.selectedIndex = Number(card.getAttribute("data-index"));
      render();
    });
    pager.addEventListener("click", function (event) {
      if (event.target.closest("#loadMoreBtn")) {
        loadMore();
      }
    });
    Array.prototype.slice.call(document.querySelectorAll("#dateFilter")).forEach(function (node) {
      node.addEventListener("change", search);
    });

    render();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全局搜索面板</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667485;
      --line: #dfe5ee;
      --blue: #2563eb;
      --blue-soft: #eaf1ff;
      --green: #147d5f;
      --green-soft: #e9f7f1;
      --amber: #9a5d12;
      --amber-soft: #fff3df;
      --red: #b83a32;
      --shadow: 0 28px 80px rgba(15, 23, 42, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.1), transparent 34%),
        linear-gradient(45deg, rgba(20, 125, 95, 0.08), transparent 38%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 72px 18px;
    }

    .launcher {
      width: min(760px, 100%);
      height: 54px;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      align-items: center;
      border: 1px solid #cfd7e3;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.1);
    }

    .launcher svg {
      margin-left: 18px;
      color: var(--muted);
    }

    .launcher input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      font-size: 16px;
      color: var(--text);
    }

    .shortcut {
      margin-right: 12px;
      height: 28px;
      min-width: 48px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      background: #f8fafc;
      font-size: 12px;
    }

    .scrim {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 10;
      background: rgba(15, 23, 42, 0.76);
      backdrop-filter: blur(5px);
    }

    .scrim.show {
      display: block;
    }

    .palette {
      position: fixed;
      z-index: 11;
      top: 56px;
      left: 50%;
      width: min(860px, calc(100vw - 32px));
      max-height: calc(100vh - 112px);
      display: none;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      transform: translateX(-50%);
    }

    .palette.show {
      display: grid;
    }

    .palette-search {
      height: 64px;
      display: grid;
      grid-template-columns: 54px 1fr auto;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .palette-search svg {
      margin-left: 20px;
      color: var(--muted);
    }

    .palette-search input {
      min-width: 0;
      border: 0;
      outline: 0;
      font-size: 17px;
      color: var(--text);
    }

    .search-action {
      height: 34px;
      margin-right: 14px;
      padding: 0 14px;
      border: 0;
      border-radius: 7px;
      color: #fff;
      background: var(--blue);
      font-weight: 650;
    }

    .content {
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 8px 10px 10px;
    }

    .table-menu {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 8px 8px 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 8px;
    }

    .table-menu-item {
      height: 30px;
      padding: 0 10px;
      border: 0;
      border-radius: 7px;
      background: #f1f5f9;
      color: #475569;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .table-menu-item.active,
    .table-menu-item:hover {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .item {
      width: 100%;
      min-height: 72px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      text-align: left;
    }

    .item:hover,
    .item.active {
      border-color: #bcd0f7;
      background: #f7faff;
    }

    .item-main {
      min-width: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      margin-bottom: 5px;
    }

    .badge {
      height: 22px;
      padding: 0 7px;
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      background: #eef2f7;
      color: #64748b;
      font-size: 12px;
      font-weight: 650;
      flex: 0 0 auto;
    }

    .badge.task {
      color: #184b88;
      background: var(--blue-soft);
    }

    .badge.biotest {
      color: var(--green);
      background: var(--green-soft);
    }

    .badge.project {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .badge.plant {
      color: #2f6f34;
      background: #edf8e9;
    }

    .badge.seed {
      color: #8a4a2d;
      background: #fff0e8;
    }

    .item-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .summary {
      margin: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .display-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 12px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .display-field {
      min-width: 0;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display-label {
      color: #475569;
      font-weight: 650;
    }

    mark {
      color: #0f3f9a;
      background: #dce9ff;
      border-radius: 3px;
      padding: 0 2px;
    }

    .side {
      display: grid;
      justify-items: end;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .status {
      color: var(--green);
      font-weight: 700;
    }

    .status.pending {
      color: var(--amber);
    }

    .status.error {
      color: var(--red);
    }

    .footer {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 14px;
      border-top: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }

    .load-more {
      height: 30px;
      padding: 0 12px;
      border: 1px solid #cfd7e3;
      border-radius: 7px;
      background: #fff;
      color: var(--text);
    }

    .load-more:disabled {
      cursor: not-allowed;
      color: var(--muted);
      background: #f4f6f8;
    }

    .empty {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 28px;
      }

      .palette {
        top: 14px;
        width: calc(100vw - 20px);
        max-height: calc(100vh - 28px);
      }

      .palette-search {
        grid-template-columns: 46px 1fr;
      }

      .search-action {
        display: none;
      }

      .item {
        grid-template-columns: 1fr;
      }

      .side {
        justify-items: start;
        grid-auto-flow: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <label class="launcher">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </svg>
      <input id="launcherInput" placeholder="搜索工单、项目、样本、载体、物种..." autocomplete="off">
      <span class="shortcut">⌘ K</span>
    </label>
  </div>

  <div id="scrim" class="scrim"></div>

  <section id="palette" class="palette">
    <div class="palette-search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </svg>
      <input id="keywordInput" placeholder="输入关键词后回车搜索" autocomplete="off">
      <button id="searchBtn" class="search-action" type="button">搜索</button>
    </div>

    <div id="content" class="content"></div>
    <div class="footer">
      <span id="metaText">输入关键词开始搜索</span>
      <button id="loadMoreBtn" class="load-more" type="button" style="display:none;">加载更多</button>
    </div>
  </section>

  <script>
    var apiUrl = "http://172.16.14.2:18099/es/search/listPage";
    var headers = {
      "Content-Type": "application/json",
      "userId": "1",
      "username": "zoujun",
      "nickname": "zoujun",
      "jobNum": "1"
    };
    var tableMap = {
      bio_task_dtl_tb: "工单",
      cer_project_tb: "项目",
      cer_sub_project_tb: "子项目",
      cer_vector_task_tb: "实施方案",
      cer_vector_tb: "载体构建",
      cer_transform_tb: "转化",
      cer_plasmid_quality_tb: "质粒质检",
      cer_conversion_and_trans_tb: "移苗",
      cer_conversion_and_trans_ref: "移苗",
      bio_sample_test_tb: "取样检测",
      bio_sample_test_one_result_tb: "一代检测",
      bio_sample_test_two_result_tb: "NGS检测",
      bio_sample_test_two_result_detail_tb: "NGS检测",
      plant_apply_tb: "CER种植",
      plant_apply_detail_tb: "CER种植明细",
      plant_multiple_stock_tb: "CER待检测库",
      plant_single_stock_tb: "CER种植库",
      plant_single_stock_tb_harvest: "CER收获库",
      seed_stock_tb: "种子库明细"
    };

    var state = {
      keyword: "",
      activeTable: "all",
      records: [],
      total: 0,
      selectedIndex: 0,
      nextSearchAfter: null,
      hasNext: false,
      loading: false,
      loadingMore: false,
      lastCost: 0
    };

    var launcherInput = document.getElementById("launcherInput");
    var keywordInput = document.getElementById("keywordInput");
    var searchBtn = document.getElementById("searchBtn");
    var scrim = document.getElementById("scrim");
    var palette = document.getElementById("palette");
    var content = document.getElementById("content");
    var metaText = document.getElementById("metaText");
    var loadMoreBtn = document.getElementById("loadMoreBtn");

    function openPalette() {
      scrim.classList.add("show");
      palette.classList.add("show");
      keywordInput.value = launcherInput.value;
      window.setTimeout(function () {
        keywordInput.focus();
        keywordInput.select();
      }, 0);
    }

    function closePalette() {
      scrim.classList.remove("show");
      palette.classList.remove("show");
      launcherInput.value = "";
      keywordInput.value = "";
      state.keyword = "";
      state.records = [];
      state.total = 0;
      state.selectedIndex = 0;
      state.nextSearchAfter = null;
      state.hasNext = false;
      state.activeTable = "all";
      render();
    }

    function normalizeRecords(payload) {
      var data = payload && payload.data ? payload.data : payload;
      var records = data && Array.isArray(data.records) ? data.records : [];
      return records.map(function (item) {
        return item.source || item;
      });
    }

    function responseData(payload) {
      return payload && payload.data ? payload.data : payload;
    }

    function requestSearch(append) {
      var started = Date.now();
      var body = {
        systemCode: "drqi",
        keyword: state.keyword,
        pageSize: 20
      };
      if (append && state.nextSearchAfter) {
        body.searchAfter = state.nextSearchAfter;
      }
      state.loading = !append;
      state.loadingMore = append;
      render();
      fetch(apiUrl, {
        method: "POST",
        headers: headers,
        body: JSON.stringify(body)
      }).then(function (res) {
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        return res.json();
      }).then(function (payload) {
        var data = responseData(payload);
        var records = normalizeRecords(payload);
        state.records = append ? state.records.concat(records) : records;
        state.total = data && typeof data.total === "number" ? data.total : state.records.length;
        state.nextSearchAfter = nextSearchAfterValue(data);
        state.hasNext = hasNextValue(data, state.nextSearchAfter) || state.records.length < state.total;
        state.selectedIndex = append ? state.selectedIndex : 0;
        state.lastCost = Date.now() - started;
        if (!append) {
          state.activeTable = "all";
        }
      }).catch(function (error) {
        state.records = append ? state.records : [];
        state.total = append ? state.total : 0;
        state.error = "接口请求失败：" + error.message;
      }).finally(function () {
        state.loading = false;
        state.loadingMore = false;
        render();
      });
    }

    function search() {
      state.keyword = keywordInput.value.trim();
      state.error = "";
      state.nextSearchAfter = null;
      state.hasNext = false;
      if (!state.keyword) {
        state.records = [];
        state.total = 0;
        render();
        return;
      }
      requestSearch(false);
    }

    function loadMore() {
      if (!state.hasNext || state.loadingMore) {
        return;
      }
      requestSearch(true);
    }

    function nextSearchAfterValue(data) {
      if (!data) {
        return null;
      }
      return fieldValue(data, "nextSearchAfter") || fieldValue(data, "next_search_after") || null;
    }

    function hasNextValue(data, nextSearchAfter) {
      if (!data) {
        return false;
      }
      var hasNext = fieldValue(data, "hasNext");
      if (typeof hasNext === "boolean") {
        return hasNext;
      }
      if (typeof hasNext === "string") {
        return hasNext.toLowerCase() === "true";
      }
      var hasNextSnake = fieldValue(data, "has_next");
      if (typeof hasNextSnake === "boolean") {
        return hasNextSnake;
      }
      if (typeof hasNextSnake === "string") {
        return hasNextSnake.toLowerCase() === "true";
      }
      return Array.isArray(nextSearchAfter) && nextSearchAfter.length > 0;
    }

    function fieldValue(data, fieldName) {
      if (!data) {
        return undefined;
      }
      if (Object.prototype.hasOwnProperty.call(data, fieldName)) {
        return data[fieldName];
      }
      var target = fieldName.toLowerCase();
      var keys = Object.keys(data);
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].toLowerCase() === target) {
          return data[keys[i]];
        }
      }
      return undefined;
    }

    function filteredRecords() {
      return state.records;
    }

    function groupedRecords(rows) {
      var groups = [];
      var map = {};
      rows.forEach(function (row) {
        var table = groupTableKey(row);
        if (!map[table]) {
          map[table] = { table: table, rows: [] };
          groups.push(map[table]);
        }
        map[table].rows.push(row);
      });
      return groups;
    }

    function render() {
      var rows = filteredRecords();
      if (state.loading) {
        content.innerHTML = '<div class="empty">正在查询...</div>';
      } else if (state.error) {
        content.innerHTML = '<div class="empty">' + escapeHtml(state.error) + '</div>';
      } else if (!state.keyword) {
        content.innerHTML = '<div class="empty">输入关键词开始搜索</div>';
      } else if (!rows.length) {
        content.innerHTML = '<div class="empty">未找到匹配数据</div>';
      } else {
        content.innerHTML = renderTableView(groupedRecords(rows));
      }
      metaText.textContent = state.keyword
        ? "共 " + state.total + " 条结果 · " + state.lastCost + " ms"
        : "输入关键词开始搜索";
      loadMoreBtn.style.display = state.hasNext ? "inline-block" : "none";
      loadMoreBtn.disabled = state.loadingMore;
      loadMoreBtn.textContent = state.loadingMore ? "加载中..." : "加载更多";
    }

    function renderTableView(groups) {
      var activeGroup = groups.filter(function (group) {
        return group.table === state.activeTable;
      })[0];
      return renderTableMenu(groups) +
        (state.activeTable === "all" ? filteredRecords().map(renderItem).join("") : activeGroup ? activeGroup.rows.map(renderItem).join("") : "");
    }

    function renderTableMenu(groups) {
      var allButton = '<button class="table-menu-item ' + (state.activeTable === "all" ? "active" : "") + '" type="button" data-table="all">全部</button>';
      return '<div class="table-menu">' + allButton + groups.map(function (group) {
        return '<button class="table-menu-item ' + (state.activeTable === group.table ? "active" : "") + '" type="button" data-table="' + escapeHtml(group.table) + '">' +
          escapeHtml(tableName(group.table)) +
          '</button>';
      }).join("") + '</div>';
    }

    function tableName(table) {
      return tableMap[table] || table || "未分类表";
    }

    function groupTableKey(row) {
      if (row && row.table_name === "plant_single_stock_tb" && String(row.plant_status || "") === "4") {
        return "plant_single_stock_tb_harvest";
      }
      return row && row.table_name ? row.table_name : "other";
    }

    function displayTableName(row) {
      return tableName(groupTableKey(row));
    }

    function renderItem(row) {
      var index = filteredRecords().indexOf(row);
      return '<button class="item ' + (index === state.selectedIndex ? "active" : "") + '" data-index="' + index + '" type="button">' +
        '<div class="item-main">' +
        '<div class="title-row">' +
        '<span class="badge ' + escapeHtml(row.business_code || "") + '">' + escapeHtml(displayTableName(row)) + '</span>' +
        '<div class="item-title">' + highlight(row.title || row.biz_id || "") + '</div>' +
        '</div>' +
        renderDisplayFields(row) +
        '</div>' +
        '<div class="side">' +
        '<span>ID: ' + escapeHtml(row.biz_id || "") + '</span>' +
        '</div>' +
        '</button>';
    }

    function renderDisplayFields(row) {
      var entries = displayEntries(row);
      if (!entries.length) {
        return "";
      }
      return '<div class="display-fields">' + entries.map(function (entry) {
        return '<span class="display-field" title="' + escapeHtml(entry.label + '：' + entry.value) + '">' +
          '<span class="display-label">' + escapeHtml(entry.label) + '：</span>' +
          highlight(entry.value) +
          '</span>';
      }).join("") + '</div>';
    }

    function displayEntries(row) {
      var display = row && row.display ? row.display : {};
      return Object.keys(display).map(function (key) {
        return {
          label: key,
          value: normalizeDisplayValue(display[key])
        };
      }).filter(function (entry) {
        return !isEmptyDisplayValue(entry.value);
      });
    }

    function normalizeDisplayValue(value) {
      if (Array.isArray(value)) {
        return value.filter(function (item) {
          return !isEmptyDisplayValue(item);
        }).join("，");
      }
      if (value && typeof value === "object") {
        return JSON.stringify(value);
      }
      return value == null ? "" : String(value);
    }

    function isEmptyDisplayValue(value) {
      if (value == null) {
        return true;
      }
      if (Array.isArray(value)) {
        return value.length === 0 || value.every(isEmptyDisplayValue);
      }
      if (typeof value === "object") {
        return Object.keys(value).length === 0;
      }
      return String(value).trim() === "";
    }

    function formatTime(value) {
      if (!value) {
        return "";
      }
      return String(value).slice(0, 16);
    }

    function highlight(value) {
      var safe = escapeHtml(String(value || ""));
      if (!state.keyword) {
        return safe;
      }
      var pattern = state.keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(pattern, "gi"), function (match) {
        return "<mark>" + match + "</mark>";
      });
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    launcherInput.addEventListener("focus", openPalette);
    launcherInput.addEventListener("click", openPalette);
    searchBtn.addEventListener("click", search);
    keywordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        search();
      } else if (event.key === "Escape") {
        closePalette();
      } else if (event.key === "ArrowDown") {
        event.preventDefault();
        var rows = filteredRecords();
        state.selectedIndex = Math.min(rows.length - 1, state.selectedIndex + 1);
        render();
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        state.selectedIndex = Math.max(0, state.selectedIndex - 1);
        render();
      }
    });
    document.addEventListener("keydown", function (event) {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        openPalette();
      }
    });
    scrim.addEventListener("click", closePalette);
    content.addEventListener("click", function (event) {
      var tableButton = event.target.closest(".table-menu-item");
      if (tableButton) {
        state.activeTable = tableButton.getAttribute("data-table");
        state.selectedIndex = 0;
        render();
        return;
      }
      var item = event.target.closest(".item");
      if (!item) {
        return;
      }
      state.selectedIndex = Number(item.getAttribute("data-index"));
      render();
    });
    loadMoreBtn.addEventListener("click", loadMore);

    render();
  </script>
</body>
</html>
